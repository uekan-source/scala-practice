# "ixias.db" が設定の起点（path）。この名前は後で SlickDataSource から参照する
ixias.db {
  driver   = "com.mysql.cj.jdbc.Driver"    # JDBC ドライバのクラス名（MySQL Connector/J）
  username = "ixias"                       # docker-compose.yml の MYSQL_USER と一致
  password = "pass"                        # docker-compose.yml の MYSQL_PASSWORD と一致

  # PRIMARY（書き込み先）ホストの設定
  hostspec.primary {
    hosts    = "127.0.0.1:13307"           # 接続先。docker の ports 左側と一致
    database = "education1"                 # docker-compose.yml の MYSQL_DATABASE と一致
  }

  # REPLICA（読み取り用）ホストの設定
  # 本番では読み取り専用レプリカを指す。ローカルは専用レプリカが無いので primary と同じ MySQL を指す
  hostspec.replica {
    hosts    = "127.0.0.1:13307"
    database = "education1"
    readonly = true                        # 読み取り専用（誤って書き込まない安全弁）
  }
}
